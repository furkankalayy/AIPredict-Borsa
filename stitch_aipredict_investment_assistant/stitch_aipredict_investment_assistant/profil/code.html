<div class="absolute -bottom-2 -right-2 bg-tertiary text-white p-2 rounded-full shadow-lg">

</div>

</section>

<span class="text-secondary font-label text-xs font-semibold uppercase tracking-wider">Portföy Değeri</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-primary">₺842.500</span>
</div>
<div class="flex items-center gap-1 text-primary text-xs font-medium">
<span class="material-symbols-outlined text-[14px]" data-icon="trending_up">trending_up</span>

</div>
</div>
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-sm flex flex-col gap-2">

<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-on-surface">128</span>
</div>
<div class="w-full h-1.5 bg-surface-container rounded-full overflow-hidden mt-1">
<div class="h-full bg-tertiary rounded-full" style="width: 72%"></div>
</div>
</div>
</section>

<div class="bg-surface-container-low rounded-lg overflow-hidden">

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="manage_accounts">manage_accounts</span>
</div>
<span class="font-medium text-on-surface">Hesap Ayarları</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Item: Bildirim Tercihleri -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container transition-colors group">

<div class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span>
</div>
<span class="font-medium text-on-surface">Bildirim Tercihleri</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Item: Güvenlik & Biyometrik -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>

</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>

<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</div>

</div>

<div class="w-4 h-4 rounded-full bg-white ml-auto"></div>
</button>
</div>
<!-- Item: Destek -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="contact_support">contact_support</span>
</div>
<span class="font-medium text-on-surface">Destek</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>

<section class="pt-4">
<button class="w-full py-4 rounded-lg bg-surface-container-highest text-error font-headline font-bold flex items-center justify-center gap-2 hover:bg-error-container transition-colors">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
